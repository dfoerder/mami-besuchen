<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Mami besuchen"/>
  <meta name="theme-color" content="#7a9a5a"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>Mami besuchen</title>

  <!-- React + Babel (kein Build-Schritt, wie in der Bibel-App) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <!-- Firebase (compat-Variante, damit es ohne Build mit Babel/JSX zusammenspielt) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- Deine Firebase-Konfiguration -->
  <script src="config.js"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#f3f1e9; --bg2:#fbfaf5; --card:#ffffff;
      --text:#33301f; --muted:#8a8470; --line:#e6e2d4;
      --accent:#7a9a5a; --accent-dark:#5a7a3a; --accent-bg:#eef3e6;
      --warn:#c87a4a; --warn-bg:#fbeee4;
      --shadow:0 1px 3px rgba(80,70,40,.08), 0 4px 16px rgba(80,70,40,.06);
      --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
    }
    html,body{background:var(--bg);color:var(--text);font-family:var(--font);
      overscroll-behavior-y:none;-webkit-font-smoothing:antialiased}
    body{padding-bottom:env(safe-area-inset-bottom)}
    #root{max-width:560px;margin:0 auto;min-height:100vh}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

    /* Header */
    .hdr{position:sticky;top:0;z-index:20;background:var(--accent);color:#fff;
      padding:calc(env(safe-area-inset-top) + 14px) 18px 14px;
      box-shadow:0 2px 12px rgba(90,122,58,.25)}
    .hdr h1{font-size:20px;font-weight:700;letter-spacing:.2px;display:flex;align-items:center;gap:8px}
    .hdr .sub{font-size:12.5px;opacity:.85;margin-top:2px}
    .offline-dot{font-size:11px;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:20px;margin-left:auto;font-weight:600}

    /* Tagesstreifen */
    .strip-wrap{position:sticky;top:0;z-index:10;background:var(--bg2);border-bottom:1px solid var(--line)}
    .strip{display:flex;gap:7px;overflow-x:auto;padding:11px 14px;scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;scrollbar-width:none}
    .strip::-webkit-scrollbar{display:none}
    .day{flex:0 0 auto;width:50px;padding:8px 0 7px;border-radius:14px;text-align:center;
      background:var(--card);border:1.5px solid var(--line);position:relative;transition:.12s}
    .day .wd{font-size:10.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
    .day .dn{font-size:18px;font-weight:700;line-height:1.25;margin-top:1px}
    .day .mo{font-size:9px;color:var(--muted);font-weight:600}
    .day .dots{display:flex;gap:3px;justify-content:center;margin-top:5px}
    .day .dot4{width:5px;height:5px;border-radius:50%;background:var(--line)}
    .day .dot4.f{background:var(--accent)}
    .day.sel{background:var(--accent);border-color:var(--accent)}
    .day.sel .wd,.day.sel .dn,.day.sel .mo{color:#fff}
    .day.sel .dot4{background:rgba(255,255,255,.35)}
    .day.sel .dot4.f{background:#fff}
    .day.today:not(.sel){border-color:var(--accent)}
    .day.today .dn{color:var(--accent-dark)}
    .day.today.sel .dn{color:#fff}
    .day.we:not(.sel) .dn{color:#b06a4a}

    /* Tages-Navigation */
    .daynav{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 4px}
    .daynav .arrow{width:38px;height:38px;border-radius:50%;background:var(--card);box-shadow:var(--shadow);
      font-size:19px;color:var(--accent-dark);display:flex;align-items:center;justify-content:center}
    .daynav .arrow:disabled{opacity:.3}
    .daynav .lbl{text-align:center}
    .daynav .lbl .d{font-size:18px;font-weight:700}
    .daynav .lbl .w{font-size:12.5px;color:var(--muted);margin-top:1px}

    .today-btn{display:block;margin:8px auto 2px;font-size:12.5px;font-weight:600;color:var(--accent-dark);
      background:var(--accent-bg);padding:5px 14px;border-radius:20px}

    /* Slots */
    .slots{padding:8px 14px 30px}
    .empty-note{background:var(--warn-bg);color:var(--warn);font-size:13px;font-weight:600;
      text-align:center;padding:10px;border-radius:12px;margin:8px 4px 12px;display:flex;
      align-items:center;justify-content:center;gap:7px}
    .slot{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:14px 15px;margin:11px 0}
    .slot-h{display:flex;align-items:center;gap:9px;margin-bottom:11px}
    .slot-h .ic{font-size:20px}
    .slot-h .nm{font-size:15.5px;font-weight:700}
    .slot-h .cnt{margin-left:auto;font-size:12px;font-weight:700;color:var(--muted);
      background:var(--bg);padding:3px 9px;border-radius:20px;min-width:24px;text-align:center}
    .slot-h .cnt.on{background:var(--accent-bg);color:var(--accent-dark)}

    .sibs{display:flex;flex-wrap:wrap;gap:7px}
    .sib{padding:8px 13px;border-radius:22px;font-size:14px;font-weight:600;border:1.5px solid var(--line);
      background:var(--bg2);color:var(--muted);display:flex;align-items:center;gap:6px;transition:.1s;user-select:none}
    .sib .dot{width:9px;height:9px;border-radius:50%}
    .sib.on{color:#fff;border-color:transparent}
    .sib.on .dot{background:rgba(255,255,255,.85)}
    .sib:active{transform:scale(.96)}

    /* Zusatzpersonen */
    .extras{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
    .extra{padding:7px 9px 7px 13px;border-radius:22px;font-size:14px;font-weight:600;
      background:#efe9f3;color:#6a4f87;display:flex;align-items:center;gap:7px}
    .extra .x{font-size:17px;line-height:1;opacity:.55;padding:0 2px}
    .addrow{display:flex;gap:8px;margin-top:10px}
    .addrow input{flex:1;min-width:0;border:1.5px solid var(--line);background:var(--bg2);border-radius:12px;
      padding:9px 12px;font-size:14px;color:var(--text);font-family:inherit}
    .addrow input:focus{outline:none;border-color:var(--accent)}
    .addrow button{background:var(--accent);color:#fff;border-radius:12px;padding:0 15px;font-size:14px;
      font-weight:700;white-space:nowrap}
    .addrow button:disabled{opacity:.4}

    .foot{text-align:center;font-size:11.5px;color:var(--muted);padding:6px 0 24px}
    .loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}

    /* Ansicht-Umschalter */
    .viewsw{display:flex;gap:6px;padding:11px 14px 3px}
    .vbtn{flex:1;padding:9px 0;border-radius:12px;font-size:14px;font-weight:700;
      color:var(--muted);background:var(--card);box-shadow:var(--shadow)}
    .vbtn.on{background:var(--accent);color:#fff}

    /* Personen-Punkte (Initialen) */
    .pdot{width:19px;height:19px;border-radius:50%;font-size:10.5px;font-weight:700;color:#fff;
      display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
    .mpdot{width:14px;height:14px;border-radius:50%;font-size:8.5px;font-weight:700;color:#fff;
      display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}

    /* Legende */
    .legend{display:flex;flex-wrap:wrap;gap:9px 13px;justify-content:center;padding:10px 16px 2px}
    .legend .li{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);font-weight:600}
    .legend .ldot{width:11px;height:11px;border-radius:50%}

    /* Wochenansicht */
    .weekgrid{padding:8px 12px 26px}
    .wkrow{display:grid;grid-template-columns:44px repeat(4,1fr);gap:4px;margin-bottom:4px}
    .wkhead{position:sticky;top:0;z-index:5;background:var(--bg);padding-top:2px}
    .wkhead .wkh{text-align:center;padding:4px 0}
    .wkhead .wkh .l{font-size:11px;color:var(--muted);font-weight:700}
    .wkday{background:var(--card);border-radius:11px;box-shadow:var(--shadow);
      display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5px 0}
    .wkday:disabled{opacity:.3}
    .wkday .w{font-size:9.5px;color:var(--muted);font-weight:700;text-transform:uppercase}
    .wkday .n{font-size:16px;font-weight:700}
    .wkrow.we .wkday .n{color:#b06a4a}
    .wkrow.today .wkday{outline:2px solid var(--accent);outline-offset:-1px}
    .wkcell{background:var(--card);border-radius:11px;box-shadow:var(--shadow);min-height:40px;
      padding:5px 4px;display:flex;flex-wrap:wrap;gap:3px;align-content:flex-start;justify-content:center}
    .wkcell:disabled,.wkcell.empty{background:var(--bg2);box-shadow:none}

    /* Monatsansicht */
    .monthgrid{padding:8px 12px 26px}
    .mwk{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
    .mhead{font-size:10.5px;color:var(--muted);font-weight:700;text-align:center;padding:3px 0 5px;text-transform:uppercase}
    .mcell{background:var(--card);border-radius:10px;box-shadow:var(--shadow);min-height:56px;
      padding:3px 3px 4px;display:flex;flex-direction:column;gap:3px;text-align:left}
    .mcell.out{background:transparent;box-shadow:none}
    .mcell.empty{background:var(--warn-bg)}
    .mcell .md{font-size:11px;font-weight:700;color:var(--text);text-align:right;padding-right:1px}
    .mcell.we .md{color:#b06a4a}
    .mcell.out .md{color:var(--muted2,#b0a58e);opacity:.5}
    .mcell.today{outline:2px solid var(--accent);outline-offset:-1px}
    .mpeople{display:flex;flex-wrap:wrap;gap:2px;justify-content:flex-start}
    .hint{text-align:center;font-size:12px;color:var(--muted);padding:4px 24px 0}

    /* Bemerkungen / Notizen */
    .notes{padding:8px 14px 30px}
    .subhd{font-size:13px;font-weight:700;color:var(--muted);margin:20px 4px 2px}
    .note-empty{background:var(--bg2);color:var(--muted);font-size:13px;text-align:center;
      padding:16px;border-radius:14px;margin:11px 4px;font-weight:600}
    .notebox{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:14px 15px;margin:11px 0}
    .notebox .lab{font-size:14px;font-weight:700;margin-bottom:9px}
    .authsel{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
    .authchip{padding:7px 12px;border-radius:22px;font-size:13.5px;font-weight:600;
      border:1.5px solid var(--line);background:var(--bg2);color:var(--muted);
      display:flex;align-items:center;gap:6px;user-select:none}
    .authchip .dot{width:9px;height:9px;border-radius:50%}
    .authchip.on{color:#fff;border-color:transparent}
    .authchip.on .dot{background:rgba(255,255,255,.85)}
    .nameinput{border:1.5px solid var(--line);background:var(--bg2);border-radius:12px;
      padding:7px 11px;font-size:13.5px;color:var(--text);font-family:inherit;min-width:120px}
    .nameinput:focus{outline:none;border-color:var(--accent)}
    .notearea{width:100%;border:1.5px solid var(--line);background:var(--bg2);border-radius:12px;
      padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);resize:vertical;min-height:64px}
    .notearea:focus{outline:none;border-color:var(--accent)}
    .noteactions{display:flex;justify-content:flex-end;margin-top:9px}
    .notesubmit{background:var(--accent);color:#fff;border-radius:12px;padding:9px 18px;font-size:14px;font-weight:700}
    .notesubmit:disabled{opacity:.4}

    .rcard{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:12px 14px;margin:10px 0}
    .rhead{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
    .rauthor{font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px}
    .rday{font-size:11.5px;color:var(--accent-dark);font-weight:700;background:var(--accent-bg);padding:2px 9px;border-radius:11px}
    .rtime{margin-left:auto;font-size:11.5px;color:var(--muted);white-space:nowrap}
    .rtext{font-size:14.5px;line-height:1.45;white-space:pre-wrap;word-break:break-word}
    .rcomments{margin-top:10px;border-left:2px solid var(--line);padding-left:11px;display:flex;flex-direction:column;gap:9px}
    .chead{display:flex;align-items:center;gap:6px;margin-bottom:3px}
    .cauthor{font-weight:700;font-size:12.5px}
    .ctime{margin-left:auto;color:var(--muted);font-size:10.5px;white-space:nowrap}
    .ctext{font-size:13.5px;line-height:1.4;white-space:pre-wrap;word-break:break-word}
    .replybtn{margin-top:9px;font-size:12.5px;font-weight:700;color:var(--accent-dark);
      background:var(--accent-bg);padding:6px 13px;border-radius:20px}
  </style>
</head>
<body>
  <div id="root"><div class="loading">Lädt …</div></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo } = React;

    // ── Konfiguration ────────────────────────────────────────
    const SIBLINGS = [
      { name: "Lucas",     color: "#2a6496" },
      { name: "Thomas",    color: "#5a7a3a" },
      { name: "Barbara",   color: "#b34a28" },
      { name: "Daniel",    color: "#7a5a9a" },
      { name: "Christine", color: "#c79a2a" },
    ];
    const SIB_NAMES = SIBLINGS.map(s => s.name);
    const SLOTS = [
      { key: "morgen",     label: "Morgen" },
      { key: "mittag",     label: "Mittag" },
      { key: "nachmittag", label: "Nachmittag" },
      { key: "abend",      label: "Abend" },
    ];
    const WD   = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
    const WD_S = ["So","Mo","Di","Mi","Do","Fr","Sa"];
    const MO   = ["Jan","Feb","März","Apr","Mai","Juni","Juli","Aug","Sep","Okt","Nov","Dez"];
    const MO_L = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];

    // Kalenderbereich: 1. Juni 2026 → 6 Monate (bis 30. November 2026)
    const START = new Date(2026, 5, 1);
    const END   = new Date(2026, 10, 30);

    const pad = n => String(n).padStart(2, "0");
    const toKey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const fromKey = k => { const [y,m,d] = k.split("-").map(Number); return new Date(y, m-1, d); };

    const ALL_DAYS = (() => {
      const out = [];
      for (let d = new Date(START); d <= END; d.setDate(d.getDate()+1)) out.push(toKey(new Date(d)));
      return out;
    })();

    const todayKey = (() => {
      const k = toKey(new Date());
      return ALL_DAYS.includes(k) ? k : null;
    })();
    const EMPTY_DAY = { morgen: [], mittag: [], nachmittag: [], abend: [] };
    const EXTRA_COLOR = "#8a7e9e"; // Farbe für Zusatzpersonen

    const addDays   = (d, n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
    const mondayOf  = d => { const x = new Date(d); x.setDate(x.getDate() - ((x.getDay()+6)%7)); x.setHours(0,0,0,0); return x; };
    const clampKey  = d => { if (d < START) return toKey(START); if (d > END) return toKey(END); return toKey(d); };

    // Zeitstempel-Formatierung für Bemerkungen
    const fmtDateTime = ms => {
      const d = new Date(ms);
      return `${d.getDate()}. ${MO[d.getMonth()]} ${d.getFullYear()}, ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    };
    const fmtDay = key => {
      const d = fromKey(key);
      return `${WD_S[d.getDay()]}, ${d.getDate()}. ${MO[d.getMonth()]}`;
    };

    // Zuletzt gewählter Autor wird lokal gemerkt
    const AUTHOR_KEY = "mami-besuchen-autor";
    const getAuthor = () => { try { return localStorage.getItem(AUTHOR_KEY) || ""; } catch { return ""; } };
    const setAuthorLS = a => { try { localStorage.setItem(AUTHOR_KEY, a); } catch {} };

    // ── Speicher-Schicht (Firebase oder lokaler Vorschaumodus) ──
    const cfg = window.FIREBASE_CONFIG || {};
    const USE_FB = cfg.apiKey && !String(cfg.apiKey).includes("DEIN_");
    let fbDb = null;
    if (USE_FB) {
      try {
        firebase.initializeApp(cfg);
        fbDb = firebase.firestore();
        // Verbindungsart automatisch erkennen (Long-Polling statt WebChannel),
        // hilft in Netzen/Geräten, wo die Standard-Verbindung blockiert wird
        // (häufig auf Android, hinter Firewalls, VPN oder Werbeblockern).
        try { fbDb.settings({ experimentalAutoDetectLongPolling: true }); } catch (e) {}
      } catch (e) { console.error("Firebase-Init fehlgeschlagen:", e); }
    }
    const LS_KEY = "mami-besuchen";
    const NOTES_KEY = "mami-besuchen-notes";

    // Schreibfehler sichtbar machen (sonst scheitert ein Eintrag stumm)
    const reportWriteError = e => {
      console.error("Schreibfehler:", e);
      const reason = (e && (e.code || e.message)) || String(e);
      alert("Eintrag konnte nicht gespeichert werden.\n\n" + reason +
            "\n\nBitte Internetverbindung prüfen und Seite neu laden.");
    };

    const Store = {
      subscribe(cb) {
        if (fbDb) {
          return fbDb.collection("tage").onSnapshot(snap => {
            const map = {};
            snap.forEach(doc => { map[doc.id] = { ...EMPTY_DAY, ...doc.data() }; });
            cb(map);
          }, err => console.error("Firestore-Fehler:", err));
        }
        // Lokal: initial laden + auf Änderungen anderer Tabs hören
        const read = () => { try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; } };
        cb(read());
        const h = e => { if (e.key === LS_KEY) cb(read()); };
        window.addEventListener("storage", h);
        window._localRefresh = () => cb(read());
        return () => window.removeEventListener("storage", h);
      },
      add(dateKey, slot, name) {
        if (fbDb) {
          fbDb.collection("tage").doc(dateKey).set(
            { [slot]: firebase.firestore.FieldValue.arrayUnion(name) }, { merge: true })
            .catch(reportWriteError);
        } else {
          const all = (() => { try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; } })();
          const day = { ...EMPTY_DAY, ...all[dateKey] };
          if (!day[slot].includes(name)) day[slot] = [...day[slot], name];
          all[dateKey] = day;
          localStorage.setItem(LS_KEY, JSON.stringify(all));
          window._localRefresh && window._localRefresh();
        }
      },
      remove(dateKey, slot, name) {
        if (fbDb) {
          fbDb.collection("tage").doc(dateKey).set(
            { [slot]: firebase.firestore.FieldValue.arrayRemove(name) }, { merge: true })
            .catch(reportWriteError);
        } else {
          const all = (() => { try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; } })();
          const day = { ...EMPTY_DAY, ...all[dateKey] };
          day[slot] = day[slot].filter(n => n !== name);
          all[dateKey] = day;
          localStorage.setItem(LS_KEY, JSON.stringify(all));
          window._localRefresh && window._localRefresh();
        }
      },

      // ── Bemerkungen (separate Sammlung "bemerkungen") ──────────
      subscribeNotes(cb) {
        if (fbDb) {
          return fbDb.collection("bemerkungen").onSnapshot(snap => {
            const arr = [];
            snap.forEach(doc => arr.push({ id: doc.id, ...doc.data() }));
            cb(arr);
          }, err => console.error("Firestore-Notizen-Fehler:", err));
        }
        const read = () => { try { return JSON.parse(localStorage.getItem(NOTES_KEY)) || []; } catch { return []; } };
        cb(read());
        const h = e => { if (e.key === NOTES_KEY) cb(read()); };
        window.addEventListener("storage", h);
        window._notesRefresh = () => cb(read());
        return () => window.removeEventListener("storage", h);
      },
      addNote(datum, autor, text) {
        const note = { datum, autor, text, ms: Date.now(), kommentare: [] };
        if (fbDb) {
          fbDb.collection("bemerkungen").add(note).catch(reportWriteError);
        } else {
          const all = (() => { try { return JSON.parse(localStorage.getItem(NOTES_KEY)) || []; } catch { return []; } })();
          note.id = "n" + note.ms + Math.random().toString(36).slice(2, 7);
          all.push(note);
          localStorage.setItem(NOTES_KEY, JSON.stringify(all));
          window._notesRefresh && window._notesRefresh();
        }
      },
      addComment(noteId, autor, text) {
        const c = { autor, text, ms: Date.now() };
        if (fbDb) {
          fbDb.collection("bemerkungen").doc(noteId).set(
            { kommentare: firebase.firestore.FieldValue.arrayUnion(c) }, { merge: true })
            .catch(reportWriteError);
        } else {
          const all = (() => { try { return JSON.parse(localStorage.getItem(NOTES_KEY)) || []; } catch { return []; } })();
          const n = all.find(x => x.id === noteId);
          if (n) {
            n.kommentare = n.kommentare || [];
            n.kommentare.push(c);
            localStorage.setItem(NOTES_KEY, JSON.stringify(all));
            window._notesRefresh && window._notesRefresh();
          }
        }
      },
    };

    // ── UI-Komponenten ───────────────────────────────────────
    function colorOf(name) {
      const s = SIBLINGS.find(s => s.name === name);
      return s ? s.color : null;
    }
    const initialOf = name => (name.trim()[0] || "?").toUpperCase();

    // Liste farbiger Initial-Punkte für eine Namensliste
    function Pdots({ names, cls }) {
      return names.map((n, i) => (
        <span key={n + i} className={cls}
          style={{ background: colorOf(n) || EXTRA_COLOR }} title={n}>
          {initialOf(n)}
        </span>
      ));
    }

    function Legend() {
      return (
        <div className="legend">
          {SIBLINGS.map(s => (
            <span key={s.name} className="li">
              <span className="ldot" style={{ background: s.color }}></span>{s.name}
            </span>
          ))}
        </div>
      );
    }

    function WeekView({ data, sel, onPick }) {
      const mon  = mondayOf(fromKey(sel));
      const days = Array.from({ length: 7 }, (_, i) => addDays(mon, i));
      return (
        <div>
          <Legend />
          <div className="weekgrid">
            <div className="wkrow wkhead">
              <div></div>
              {SLOTS.map(s => (
                <div key={s.key} className="wkh">
                  <div className="l">{s.label}</div>
                </div>
              ))}
            </div>
            {days.map(d => {
              const key = toKey(d), wd = d.getDay();
              const inRange = d >= START && d <= END;
              const dd = (data && data[key]) || EMPTY_DAY;
              const cls = ["wkrow"];
              if (wd === 0 || wd === 6) cls.push("we");
              if (key === todayKey) cls.push("today");
              return (
                <div key={key} className={cls.join(" ")}>
                  <button className="wkday" disabled={!inRange} onClick={() => onPick(key)}>
                    <span className="w">{WD_S[wd]}</span>
                    <span className="n">{d.getDate()}</span>
                  </button>
                  {SLOTS.map(s => {
                    const names = dd[s.key] || [];
                    return (
                      <button key={s.key} className={"wkcell" + (names.length ? "" : " empty")}
                        disabled={!inRange} onClick={() => onPick(key)}>
                        <Pdots names={names} cls="pdot" />
                      </button>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function MonthView({ data, sel, onPick }) {
      const sd = fromKey(sel), y = sd.getFullYear(), m = sd.getMonth();
      const first = new Date(y, m, 1);
      const lead  = (first.getDay() + 6) % 7;
      const dim   = new Date(y, m + 1, 0).getDate();
      const weeks = Math.ceil((lead + dim) / 7);
      const c0    = addDays(first, -lead);
      const cells = Array.from({ length: weeks * 7 }, (_, i) => addDays(c0, i));
      const HEAD  = ["Mo","Di","Mi","Do","Fr","Sa","So"];
      return (
        <div>
          <Legend />
          <div className="monthgrid">
            <div className="mwk">{HEAD.map(h => <div key={h} className="mhead">{h}</div>)}</div>
            <div className="mwk">
              {cells.map((d, i) => {
                const key = toKey(d), wd = d.getDay();
                const inMonth = d.getMonth() === m;
                const inRange = d >= START && d <= END;
                const dd = (data && data[key]) || EMPTY_DAY;
                const people = [];
                SLOTS.forEach(s => (dd[s.key] || []).forEach(n => { if (!people.includes(n)) people.push(n); }));
                const tappable = inMonth && inRange;
                const cls = ["mcell"];
                if (!tappable) cls.push("out");
                else if (people.length === 0) cls.push("empty");
                if (wd === 0 || wd === 6) cls.push("we");
                if (key === todayKey) cls.push("today");
                return (
                  <button key={i} className={cls.join(" ")} disabled={!tappable}
                    onClick={() => onPick(key)}>
                    <span className="md">{d.getDate()}</span>
                    {inMonth &&
                      <span className="mpeople"><Pdots names={people} cls="mpdot" /></span>}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // Auswahl, wer schreibt (5 Geschwister + freier Name); merkt sich die Wahl
    function AuthorSelect({ value, onChange }) {
      const [otherOn, setOtherOn] = useState(!!value && !SIB_NAMES.includes(value));
      return (
        <div className="authsel">
          {SIBLINGS.map(s => (
            <button key={s.name} className={"authchip" + (value === s.name ? " on" : "")}
              style={value === s.name ? { background: s.color } : null}
              onClick={() => { setOtherOn(false); onChange(s.name); }}>
              <span className="dot" style={value !== s.name ? { background: s.color } : null}></span>
              {s.name}
            </button>
          ))}
          <button className={"authchip" + (otherOn ? " on" : "")}
            style={otherOn ? { background: EXTRA_COLOR } : null}
            onClick={() => { setOtherOn(true); onChange(""); }}>Andere</button>
          {otherOn &&
            <input className="nameinput" placeholder="Dein Name" autoFocus
              value={SIB_NAMES.includes(value) ? "" : value}
              onChange={e => onChange(e.target.value)} />}
        </div>
      );
    }

    function NoteComposer({ label, btnLabel, placeholder, onSubmit }) {
      const [autor, setAutor] = useState(getAuthor());
      const [text, setText] = useState("");
      const ok = autor.trim() && text.trim();
      const submit = () => {
        if (!ok) return;
        const a = autor.trim();
        setAuthorLS(a);
        onSubmit(a, text.trim());
        setText("");
      };
      return (
        <div className="notebox">
          {label && <div className="lab">{label}</div>}
          <AuthorSelect value={autor} onChange={setAutor} />
          <textarea className="notearea" placeholder={placeholder} value={text}
            onChange={e => setText(e.target.value)} />
          <div className="noteactions">
            <button className="notesubmit" disabled={!ok} onClick={submit}>{btnLabel}</button>
          </div>
        </div>
      );
    }

    function RemarkCard({ note, showDay, onComment }) {
      const [replying, setReplying] = useState(false);
      const comments = (note.kommentare || []).slice().sort((a, b) => a.ms - b.ms);
      return (
        <div className="rcard">
          <div className="rhead">
            <span className="rauthor">
              <span className="pdot" style={{ background: colorOf(note.autor) || EXTRA_COLOR }}>
                {initialOf(note.autor)}</span>
              {note.autor}
            </span>
            {showDay && <span className="rday">{fmtDay(note.datum)}</span>}
            <span className="rtime">{fmtDateTime(note.ms)}</span>
          </div>
          <div className="rtext">{note.text}</div>
          {comments.length > 0 &&
            <div className="rcomments">
              {comments.map((c, i) => (
                <div key={i}>
                  <div className="chead">
                    <span className="pdot" style={{ width: 15, height: 15, fontSize: 9,
                      background: colorOf(c.autor) || EXTRA_COLOR }}>{initialOf(c.autor)}</span>
                    <span className="cauthor">{c.autor}</span>
                    <span className="ctime">{fmtDateTime(c.ms)}</span>
                  </div>
                  <div className="ctext">{c.text}</div>
                </div>
              ))}
            </div>}
          {replying
            ? <NoteComposer btnLabel="Kommentar speichern" placeholder="Ergänzung / Kommentar …"
                onSubmit={(a, t) => { onComment(note.id, a, t); setReplying(false); }} />
            : <button className="replybtn" onClick={() => setReplying(true)}>+ Kommentieren</button>}
        </div>
      );
    }

    function NotesView({ notes, onComment }) {
      const sorted = notes.slice().sort((a, b) => b.ms - a.ms);
      return (
        <div className="notes">
          {sorted.length === 0
            ? <div className="note-empty">Noch keine Bemerkungen vorhanden.</div>
            : sorted.map(n => <RemarkCard key={n.id} note={n} showDay={true} onComment={onComment} />)}
        </div>
      );
    }

    function Slot({ dateKey, slot, names }) {
      const [txt, setTxt] = useState("");
      const extras = names.filter(n => !SIB_NAMES.includes(n));
      const count = names.length;

      const toggleSib = name => {
        if (names.includes(name)) Store.remove(dateKey, slot.key, name);
        else Store.add(dateKey, slot.key, name);
      };
      const addExtra = () => {
        const n = txt.trim();
        if (!n) return;
        if (!names.includes(n)) Store.add(dateKey, slot.key, n);
        setTxt("");
      };

      return (
        <div className="slot">
          <div className="slot-h">
            <span className="nm">{slot.label}</span>
            <span className={"cnt" + (count ? " on" : "")}>{count}</span>
          </div>
          <div className="sibs">
            {SIBLINGS.map(s => {
              const on = names.includes(s.name);
              return (
                <button key={s.name} className={"sib" + (on ? " on" : "")}
                  style={on ? { background: s.color } : null}
                  onClick={() => toggleSib(s.name)}>
                  <span className="dot" style={!on ? { background: s.color } : null}></span>
                  {s.name}
                </button>
              );
            })}
          </div>
          {extras.length > 0 && (
            <div className="extras">
              {extras.map(n => (
                <span key={n} className="extra">{n}
                  <span className="x" onClick={() => Store.remove(dateKey, slot.key, n)}>×</span>
                </span>
              ))}
            </div>
          )}
          <div className="addrow">
            <input type="text" placeholder="Weitere Person …" value={txt}
              onChange={e => setTxt(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter") addExtra(); }} />
            <button onClick={addExtra} disabled={!txt.trim()}>＋</button>
          </div>
        </div>
      );
    }

    const VIEWS = [["tag","Tag"],["woche","Woche"],["monat","Monat"],["notizen","Notizen"]];

    function App() {
      const [data, setData] = useState(null);
      const [notes, setNotes] = useState([]);
      const [sel, setSel] = useState(todayKey || ALL_DAYS[0]);
      const [view, setView] = useState("tag");
      const stripRef = useRef(null);
      const dayRefs = useRef({});

      useEffect(() => Store.subscribe(setData), []);
      useEffect(() => Store.subscribeNotes(setNotes), []);

      // ausgewählten Tag im Streifen sichtbar machen (nur Tagesansicht)
      useEffect(() => {
        if (view !== "tag") return;
        const el = dayRefs.current[sel];
        if (el) el.scrollIntoView({ inline: "center", block: "nearest", behavior: "smooth" });
      }, [sel, view]);

      const totalOf = key => {
        const d = data && data[key];
        if (!d) return 0;
        return SLOTS.reduce((a, s) => a + (d[s.key] ? d[s.key].length : 0), 0);
      };

      // Navigationsziel je nach Ansicht (Tag/Woche/Monat), auf Bereich begrenzt
      const targetFor = dir => {
        const d = fromKey(sel);
        if (view === "monat") d.setMonth(d.getMonth() + dir);
        else d.setDate(d.getDate() + dir * (view === "woche" ? 7 : 1));
        return clampKey(d);
      };
      const prevTarget = targetFor(-1), nextTarget = targetFor(1);

      const pickDay = key => { setSel(key); setView("tag"); };

      const selDate = fromKey(sel);
      const selDay = (data && data[sel]) || EMPTY_DAY;
      const selTotal = totalOf(sel);
      const dayNotes = notes.filter(n => n.datum === sel).sort((a, b) => b.ms - a.ms);

      // Beschriftung der Navigationsleiste
      let navLabel, navSub;
      if (view === "tag") {
        navLabel = `${selDate.getDate()}. ${MO_L[selDate.getMonth()]} ${selDate.getFullYear()}`;
        navSub = WD[selDate.getDay()];
      } else if (view === "woche") {
        const mon = mondayOf(selDate), sun = addDays(mon, 6);
        navLabel = mon.getMonth() === sun.getMonth()
          ? `${mon.getDate()}.–${sun.getDate()}. ${MO_L[sun.getMonth()]} ${sun.getFullYear()}`
          : `${mon.getDate()}. ${MO[mon.getMonth()]} – ${sun.getDate()}. ${MO[sun.getMonth()]} ${sun.getFullYear()}`;
        navSub = "Woche";
      } else {
        navLabel = `${MO_L[selDate.getMonth()]} ${selDate.getFullYear()}`;
        navSub = "Monat";
      }

      if (data === null) return <div className="loading">Lädt …</div>;

      return (
        <div>
          <div className="hdr">
            <h1>Mami besuchen
              {!USE_FB && <span className="offline-dot">Vorschau</span>}
            </h1>
            <div className="sub">Wer besucht Mami wann?</div>
          </div>

          <div className="viewsw">
            {VIEWS.map(([k, l]) => (
              <button key={k} className={"vbtn" + (view === k ? " on" : "")}
                onClick={() => setView(k)}>{l}</button>
            ))}
          </div>

          {view === "tag" &&
            <div className="strip-wrap">
              <div className="strip" ref={stripRef}>
                {ALL_DAYS.map(key => {
                  const d = fromKey(key);
                  const wd = d.getDay();
                  const dd = (data && data[key]) || EMPTY_DAY;
                  const cls = ["day"];
                  if (key === sel) cls.push("sel");
                  if (key === todayKey) cls.push("today");
                  if (wd === 0 || wd === 6) cls.push("we");
                  return (
                    <button key={key} ref={el => dayRefs.current[key] = el}
                      className={cls.join(" ")} onClick={() => setSel(key)}>
                      <div className="wd">{WD_S[wd]}</div>
                      <div className="dn">{d.getDate()}</div>
                      <div className="mo">{MO[d.getMonth()]}</div>
                      <div className="dots">
                        {SLOTS.map(s => (
                          <span key={s.key}
                            className={"dot4" + (dd[s.key] && dd[s.key].length ? " f" : "")}></span>
                        ))}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>}

          {view !== "notizen" && <>
            <div className="daynav">
              <button className="arrow" onClick={() => setSel(prevTarget)}
                disabled={prevTarget === sel}>‹</button>
              <div className="lbl">
                <div className="d">{navLabel}</div>
                <div className="w">{navSub}</div>
              </div>
              <button className="arrow" onClick={() => setSel(nextTarget)}
                disabled={nextTarget === sel}>›</button>
            </div>
            {todayKey && sel !== todayKey &&
              <button className="today-btn" onClick={() => setSel(todayKey)}>Heute</button>}
          </>}

          {view === "tag" &&
            <div className="slots">
              {selTotal === 0 &&
                <div className="empty-note">⚠️ Für diesen Tag ist noch kein Besuch eingetragen</div>}
              {SLOTS.map(s => (
                <Slot key={s.key} dateKey={sel} slot={s} names={selDay[s.key] || []} />
              ))}

              <NoteComposer label="Neue Bemerkung" btnLabel="Speichern"
                placeholder="Wie war der Besuch? …"
                onSubmit={(a, t) => Store.addNote(sel, a, t)} />
              {dayNotes.length > 0 && <div className="subhd">Bemerkungen zu diesem Tag</div>}
              {dayNotes.map(n => (
                <RemarkCard key={n.id} note={n} showDay={false}
                  onComment={(id, a, t) => Store.addComment(id, a, t)} />
              ))}

              <div className="foot">
                {USE_FB ? "Gemeinsamer Kalender · Änderungen erscheinen live"
                        : "Vorschau-Modus · Daten nur auf diesem Gerät"}
              </div>
            </div>}

          {view === "woche" && <>
            <WeekView data={data} sel={sel} onPick={pickDay} />
            <div className="hint">Tippe auf einen Tag, um ihn zu bearbeiten.</div>
          </>}

          {view === "monat" && <>
            <MonthView data={data} sel={sel} onPick={pickDay} />
            <div className="hint">Rot = noch kein Besuch · Tippe auf einen Tag zum Bearbeiten.</div>
          </>}

          {view === "notizen" &&
            <NotesView notes={notes} onComment={(id, a, t) => Store.addComment(id, a, t)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);

    // Service Worker registrieren
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
    }
  </script>
</body>
</html>
